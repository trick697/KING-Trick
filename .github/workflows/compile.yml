name: Compilar APK Automático

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código de la app
      uses: actions/checkout@v4

    - name: Configurar Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle de forma automática
      uses: gradle/actions/setup-gradle@v3

    - name: Compilar APK con Gradle interno
      run: gradle assembleDebug

    - name: Guardar el APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Aplicacion-APK
        path: app/build/outputs/apk/debug/app-debug.apk
